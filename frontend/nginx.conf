server {
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the backend
    location /api/ {
        proxy_pass https://backend-production-7c96.up.railway.app/api/;
        proxy_set_header Host backend-production-7c96.up.railway.app;
        proxy_ssl_server_name on;
    }

    # All other requests serve the React app
    location / {
        try_files $uri $uri/ /index.html;
    }
}
